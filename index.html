<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title>Фильтры и сортировка</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JavaScript/data.js"></script>
    <script src="JavaScript/main.js"></script>
    <script src="JavaScript/table.js"></script>
    <script src="JavaScript/filter.js"></script>
    <script src="JavaScript/sort.js"></script>
  </head>
  <body>
    <div class="forms-container"> 
    <form id="filter">
    <h1>Фильтр</h1>
    <p>
        <label for="name">Название:</label>
        <input type="text" id="name">
    </p>
    <p>
        <label for="platform">Платформа:</label>
        <input type="text" id="platform">
    </p>
    <p>
        <label for="publisher">Студия:</label>
        <input type="text" id="publisher">
    </p>
    <p>
        <label for="genre">Жанр:</label>
        <input type="text" id="genre">
    </p>
    <p>
        <label for="yearFrom">Год: </label>
        от <input type="number" id="yearFrom"> 
        до <input type="number" id="yearTo">
    </p>
    <p>
        <label for="scoreFrom">Балл Metacritic:</label>
        от <input type="number" id="scoreFrom"> 
        до <input type="number" id="scoreTo">
    </p>
    <input type="button" value="Найти" id="findBtn">
    <input type="button" value="Очистить фильтры" id="clearBtn"> 
    </form> 
    <form id="sort">
    <h1>Сортировка</h1>
    <p> Сортировать по</p>
    <p>
      <select id="fieldsFirst">
      </select> 
      по убыванию? <input  type="checkbox"  id="fieldsFirstDesc">
    </p>
    <p> 
      <select id="fieldsSecond">
      </select> 
      по убыванию? <input  type="checkbox"  id="fieldsSecondDesc">
    </p>
    <p> 
      <select id="fieldsThird">
      </select> 
      по убыванию? <input  type="checkbox"  id="fieldsThirdDesc">
    </p>
    <input type="button" value="Сортировать" id="sortBtn"> 
    <input type="button" value="Сбросить сортировку" id="clearSort">
    </form>
    </div>
    <br>
    <table id="list">
    </table>

  </body>
</html>
